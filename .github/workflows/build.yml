name: Mobile Artifacts (APK + IPA)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Ensure Android Platform Folder
        run: flutter create --platforms=android .

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk

  ios:
    name: Build iOS IPA (unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Ensure iOS Platform Folder
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

      - name: Patch ffmpeg kit podspec dependency
        run: |
          set -e
          SPEC_PATH="$(find "$PUB_CACHE/hosted" -type f -name ffmpeg_kit_flutter.podspec | head -n 1)"
          if [ -z "$SPEC_PATH" ]; then
            echo "ffmpeg_kit_flutter.podspec not found"
            exit 1
          fi
          echo "Patching $SPEC_PATH"
          sed -i '' "s/ffmpeg-kit-ios-https/ffmpeg-kit-ios-full/g" "$SPEC_PATH"

      - name: Inject ffmpeg mirror pod into Podfile
        run: |
          set -e
          PODFILE="ios/Podfile"
          if ! grep -q "ffmpeg-kit-ios-full" "$PODFILE"; then
            awk '
              /target '\''Runner'\'' do/ {
                print;
                print "  pod '\''ffmpeg-kit-ios-full'\'', :podspec => '\''https://raw.githubusercontent.com/luthviar/ffmpeg-kit-ios-full/main/ffmpeg-kit-ios-full.podspec'\''";
                next
              }
              { print }
            ' "$PODFILE" > "$PODFILE.tmp"
            mv "$PODFILE.tmp" "$PODFILE"
          fi

      - name: Pod Install
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          set -e
          APP_PATH="build/ios/iphoneos/Runner.app"
          test -d "$APP_PATH"
          rm -rf Payload kyomiru-ios-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/Runner.app
          ditto -c -k --sequesterRsrc --keepParent Payload kyomiru-ios-unsigned.ipa
          test -f kyomiru-ios-unsigned.ipa

      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: kyomiru-ios-unsigned.ipa
