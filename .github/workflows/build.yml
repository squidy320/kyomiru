name: Mobile Artifacts (APK + IPA)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Ensure Android Platform Folder
        run: flutter create --platforms=android .

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk

  ios:
    name: Build iOS IPA (unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Ensure iOS Platform Folder
        run: |
          if [ ! -d "ios" ] || [ ! -d "ios/Runner.xcodeproj" ]; then
            flutter create --platforms=ios .
          fi

      - name: Clean iOS pods state
        run: |
          rm -rf ios/Pods
          rm -f ios/Podfile.lock

      - name: Pod Install
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS IPA (unsigned)
        run: |
          flutter build ipa --release --no-codesign --split-debug-info=build/app/outputs/symbols \
          --dart-define=FOR_IOS=true \
          --build-name=1.0.0 \
          --build-number=1

      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/ipa/*.ipa
