name: Flutter CI Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  android:
    name: Android Sideload Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Ensure Android Platform Folder
        run: flutter create --platforms=android .

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Build Android AppBundle (release)
        run: flutter build appbundle --release

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Android AppBundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-appbundle-release
          path: build/app/outputs/bundle/release/app-release.aab

  ios:
    name: iOS Sideload Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Ensure iOS Platform Folder
        run: flutter create --platforms=ios .

      - name: Update Pod Repo
        working-directory: ios
        run: pod repo update

      - name: Pod Install
        working-directory: ios
        run: pod install --repo-update

      - name: Build iOS App (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Pack unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          /usr/bin/zip -r unsigned.ipa Payload

      - name: Upload iOS Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: unsigned.ipa

      - name: Upload iOS App Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app
          path: build/ios/iphoneos/Runner.app
