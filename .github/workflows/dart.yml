name: Build Expo iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Prebuild iOS project
        run: npx expo prebuild -p ios --non-interactive

      - name: Build app
        run: |
          cd ios
          xcodebuild \
            -workspace kyomiru.xcworkspace \
            -scheme kyomiru \
            -configuration Release \
            -sdk iphoneos \
            -allowProvisioningUpdates \
            -archivePath $PWD/build/kyomiru.xcarchive \
            archive

      - name: Export IPA
        run: |
          cd ios
          mkdir -p build/export
          xcodebuild -exportArchive \
            -archivePath build/kyomiru.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: kyomiru-ipa
          path: ios/build/export
