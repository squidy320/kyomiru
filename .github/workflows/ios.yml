name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "lib/**"
      - "ios/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/ios.yml"

jobs:
  build-ios:
    name: Build Unsigned IPA (sideload)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Version
        run: flutter --version

      - name: Clean
        run: flutter clean

      - name: Pub Get
        run: flutter pub get

      - name: Ensure iOS folder exists
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

      - name: Pod Install
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS archive (no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Ensure unsigned IPA exists
        run: |
          set -e
          rm -f unsigned.ipa

          if ls build/ios/ipa/*.ipa >/dev/null 2>&1; then
            cp "$(ls build/ios/ipa/*.ipa | head -n 1)" unsigned.ipa
            echo "Using IPA exported by flutter build ipa"
          else
            echo "No IPA exported (expected with --no-codesign on some toolchains); packaging from xcarchive"
            APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
            test -d "$APP_PATH"
            rm -rf Payload
            mkdir -p Payload
            ditto "$APP_PATH" Payload/Runner.app
            ditto -c -k --sequesterRsrc --keepParent Payload unsigned.ipa
          fi

          test -f unsigned.ipa

      - name: Verify IPA contents and framework sanity
        run: |
          rm -rf ipa_check
          mkdir -p ipa_check
          unzip -q unsigned.ipa -d ipa_check
          test -d ipa_check/Payload/Runner.app
          test -d ipa_check/Payload/Runner.app/Frameworks

          # Ensure no manually injected mpv.framework is present.
          if find ipa_check/Payload/Runner.app/Frameworks -maxdepth 2 -name "mpv.framework" | grep -q "mpv.framework"; then
            echo "Found manually embedded mpv.framework in IPA. Failing build."
            exit 1
          fi

          ls -la ipa_check/Payload/Runner.app/Frameworks

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: unsigned.ipa
