name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "lib/**"
      - "ios/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/ios.yml"

jobs:
  build-ios:
    name: Build Unsigned IPA (sideload)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Version
        run: flutter --version

      - name: Clean
        run: flutter clean

      - name: Pub Get
        run: flutter pub get

      - name: Ensure iOS folder exists
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

      - name: Pod Install
        run: |
          cd ios
          pod install --repo-update

      - name: Build Runner.app (xcodebuild, no codesign)
        run: |
          set -e
          rm -rf build/ios/DerivedData
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -derivedDataPath build/ios/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package unsigned IPA (no binary mutation)
        run: |
          set -e
          APP_PATH="build/ios/DerivedData/Build/Products/Release-iphoneos/Runner.app"
          test -d "$APP_PATH"

          rm -rf Payload unsigned.ipa
          cp -R "$APP_PATH" Runner.app

          # Remove all pre-existing signatures/provisions only.
          find Runner.app -name "_CodeSignature" -type d -prune -exec rm -rf {} +
          find Runner.app -name "embedded.mobileprovision" -type f -delete

          mkdir -p Payload
          mv Runner.app Payload/Runner.app
          # Use ditto for Apple-friendly IPA zip structure.
          ditto -c -k --sequesterRsrc --keepParent Payload unsigned.ipa
          test -f unsigned.ipa

      - name: Verify IPA contents
        run: |
          rm -rf ipa_check
          mkdir -p ipa_check
          unzip -q unsigned.ipa -d ipa_check
          test -d ipa_check/Payload/Runner.app
          test -d ipa_check/Payload/Runner.app/Frameworks
          ls -la ipa_check/Payload/Runner.app/Frameworks

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: unsigned.ipa
