name: iOS IPA Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "lib/**"
      - "ios/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/ios.yml"

jobs:
  build-ios:
    name: Build Unsigned IPA (sideload)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Version
        run: flutter --version

      - name: Clean
        run: flutter clean

      - name: Pub Get
        run: flutter pub get

      - name: Ensure iOS folder exists
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

      - name: Pod Install
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS archive (no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Ensure unsigned IPA exists
        run: |
          set -e
          rm -f unsigned.ipa

          if ls build/ios/ipa/*.ipa >/dev/null 2>&1; then
            cp "$(ls build/ios/ipa/*.ipa | head -n 1)" unsigned.ipa
            echo "Using IPA exported by flutter build ipa"
          else
            echo "No IPA exported (expected with --no-codesign on some toolchains); packaging from xcarchive"
            APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
            test -d "$APP_PATH"
            rm -rf Payload
            mkdir -p Payload
            ditto "$APP_PATH" Payload/Runner.app
            ditto -c -k --sequesterRsrc --keepParent Payload unsigned.ipa
          fi

          test -f unsigned.ipa

      - name: Normalize IPA binaries for sideload
        run: |
          set -e
          rm -rf ipa_work
          mkdir -p ipa_work
          unzip -q unsigned.ipa -d ipa_work

          APP_DIR="ipa_work/Payload/Runner.app"
          FW_DIR="$APP_DIR/Frameworks"

          # Remove existing code signatures; sideload tool will re-sign everything.
          find "$APP_DIR" -name "_CodeSignature" -type d -prune -exec rm -rf {} +

          # Strip simulator architectures and keep device-safe arm64 binaries.
          find "$FW_DIR" -name "*.framework" -type d | while read -r fw; do
            name=$(basename "$fw" .framework)
            bin="$fw/$name"
            if [ -f "$bin" ]; then
              info=$(lipo -info "$bin" 2>/dev/null || true)
              echo "[ARCH] $name -> $info"

              # Remove simulator arches if present.
              if echo "$info" | grep -q "x86_64"; then
                lipo -remove x86_64 "$bin" -output "$bin" || true
              fi
              if echo "$info" | grep -q "i386"; then
                lipo -remove i386 "$bin" -output "$bin" || true
              fi

              # Ensure arm64 exists after thinning.
              info_after=$(lipo -info "$bin" 2>/dev/null || true)
              echo "[ARCH_AFTER] $name -> $info_after"
              if ! echo "$info_after" | grep -Eq "(architecture: arm64|are: .*arm64)"; then
                echo "Missing arm64 in $bin"
                exit 1
              fi

              # Strip bitcode markers if present (safer for sideload re-signers).
              xcrun bitcode_strip "$bin" -r -o "$bin" || true
            fi
          done

          # Repack normalized IPA.
          rm -f unsigned.ipa
          (cd ipa_work && zip -qry ../unsigned.ipa Payload)
          test -f unsigned.ipa

      - name: Verify IPA contents and framework sanity
        run: |
          rm -rf ipa_check
          mkdir -p ipa_check
          unzip -q unsigned.ipa -d ipa_check
          test -d ipa_check/Payload/Runner.app
          test -d ipa_check/Payload/Runner.app/Frameworks

          # Ensure no manually injected lowercase mpv.framework (legacy manual embed pattern).
          if find ipa_check/Payload/Runner.app/Frameworks -maxdepth 2 -name "mpv.framework" | grep -q "mpv.framework"; then
            echo "Found manually embedded mpv.framework naming pattern. Failing build."
            exit 1
          fi

          ls -la ipa_check/Payload/Runner.app/Frameworks

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: unsigned.ipa

